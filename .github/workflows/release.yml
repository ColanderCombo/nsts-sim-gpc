name: Release builds

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      attach-to-release:
        description: "Tag name of a release to attach artifacts to (leave blank for just CI artifacts)"
        required: false
        default: ""
  # Pushes to `main` build + publish a rolling "latest" release (see the
  # publish-latest job below).  The dev branch build is just CI, no publish.
  push:
    branches:
      - main
      - dev-unified-cmd-pkg

# softprops/action-gh-release needs write access to the releases API.
permissions:
  contents: write

jobs:
  # ------------------------------------------------------------------
  # Linux x86_64 AppImage
  # ------------------------------------------------------------------
  build-linux:
    name: Linux AppImage (x86_64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        # package-lock.json is gitignored in this repo, so use `npm install`
        # rather than `npm ci`.  Dependency set is small and stable.
        run: npm install

      - name: Build JS bundles
        run: npm run dist:prep

      - name: Package AppImage
        # --publish never keeps electron-builder from trying to upload to
        # a GitHub draft release (which requires GH_TOKEN and fails in CI).
        # We attach artifacts via softprops/action-gh-release below instead.
        run: npx electron-builder --linux --publish never

      - name: List build output
        run: ls -la release/

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpc-linux-x86_64-AppImage
          path: release/*.AppImage
          if-no-files-found: error

      - name: Attach to release
        if: github.event_name == 'release' || github.event.inputs.attach-to-release != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.attach-to-release }}
          files: release/*.AppImage

  # ------------------------------------------------------------------
  # macOS (arm64 native on macos-latest; x64 cross-compiled from the
  # same arm64 runner — electron-builder downloads the matching Electron
  # binary for each arch.  GitHub retired the last x64-native runner
  # (macos-13) so we no longer have one to pin to.)
  # ------------------------------------------------------------------
  build-mac:
    name: macOS (${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build JS bundles
        run: npm run dist:prep

      - name: Package macOS app
        # See Linux note re: --publish never.
        run: npx electron-builder --mac --${{ matrix.arch }} --publish never
        env:
          # Skip code signing in CI — no cert provisioned.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: List build output
        run: ls -la release/

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpc-mac-${{ matrix.arch }}
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error

      - name: Attach to release
        if: github.event_name == 'release' || github.event.inputs.attach-to-release != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.attach-to-release }}
          files: |
            release/*.dmg
            release/*.zip

  # ------------------------------------------------------------------
  # publish-latest: on every push to main, replace the rolling "latest"
  # release with the freshly built artifacts.  This gives end users a
  # stable URL (https://github.com/OWNER/REPO/releases/latest) that
  # always points at the current main build.
  # ------------------------------------------------------------------
  publish-latest:
    name: Publish rolling 'latest' release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-linux, build-mac]
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: find artifacts -type f

      - name: Replace 'latest' release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Delete any existing 'latest' release + tag so we start clean.
          gh release delete latest \
            --repo "$GITHUB_REPOSITORY" \
            --yes --cleanup-tag 2>/dev/null || true
          # Create a fresh release pointing at the current commit and
          # attach every artifact we downloaded.
          mapfile -t files < <(find artifacts -type f)
          gh release create latest \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --prerelease \
            --title "Latest build" \
            --notes "Automated build from commit $GITHUB_SHA" \
            "${files[@]}"

name: Release builds

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      attach-to-release:
        description: "Tag name of a release to attach artifacts to (leave blank for just CI artifacts)"
        required: false
        default: ""
  # Temporary: run on pushes to the dev-unified-cmd-pkg branch so we can
  # test the build pipeline before merging this workflow into main.
  # Remove (or narrow) this before merge if you don't want every commit
  # on the dev branch to burn CI time.
  push:
    branches:
      - dev-unified-cmd-pkg

# softprops/action-gh-release needs write access to the releases API.
permissions:
  contents: write

jobs:
  # ------------------------------------------------------------------
  # Linux x86_64 AppImage
  # ------------------------------------------------------------------
  build-linux:
    name: Linux AppImage (x86_64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        # package-lock.json is gitignored in this repo, so use `npm install`
        # rather than `npm ci`.  Dependency set is small and stable.
        run: npm install

      - name: Build JS bundles
        run: npm run dist:prep

      - name: Package AppImage
        # --publish never keeps electron-builder from trying to upload to
        # a GitHub draft release (which requires GH_TOKEN and fails in CI).
        # We attach artifacts via softprops/action-gh-release below instead.
        run: npx electron-builder --linux --publish never

      - name: List build output
        run: ls -la release/

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpc-linux-x86_64-AppImage
          path: release/*.AppImage
          if-no-files-found: error

      - name: Attach to release
        if: github.event_name == 'release' || github.event.inputs.attach-to-release != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.attach-to-release }}
          files: release/*.AppImage

  # ------------------------------------------------------------------
  # macOS (arm64 on macos-14, x64 on macos-13)
  # ------------------------------------------------------------------
  build-mac:
    name: macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14   # arm64 native runner
            arch: arm64
          - runner: macos-13   # x64 native runner
            arch: x64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build JS bundles
        run: npm run dist:prep

      - name: Package macOS app
        # See Linux note re: --publish never.
        run: npx electron-builder --mac --${{ matrix.arch }} --publish never
        env:
          # Skip code signing in CI — no cert provisioned.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: List build output
        run: ls -la release/

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpc-mac-${{ matrix.arch }}
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error

      - name: Attach to release
        if: github.event_name == 'release' || github.event.inputs.attach-to-release != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.attach-to-release }}
          files: |
            release/*.dmg
            release/*.zip
